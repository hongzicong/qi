# RTC-style FastWAM real-robot deployment config.
#
# Paths in this file are resolved relative to this config file by the new
# FastWAMPolicyConfig loader.

wam:
  ckpt: "../checkpoints/fastwam_real_checkpoint/step_020000.pt"                                   # model weights to load (step_xxxxxx.pt); relative to this yaml -> <repo>/checkpoints/...
  dataset_stats: "../checkpoints/fastwam_real_checkpoint/dataset_stats.json"                      # state/action normalization stats; relative to this yaml -> <repo>/checkpoints/...
  task: "real_cleaning_uncond_3cam_384_1e-4"                                                      # Hydra task name (used only if train_config is null)
  config_dir: "."                                                                                 # Hydra config root, relative to this yaml
  train_config: null                                                           # saved training config (14-dim/dual, must match the loaded ckpt); if set, bypasses Hydra compose
  device: "cuda:0"                                                                                # device for model inference
  mixed_precision: "bf16"                                                                         # model dtype: "no" | "fp16" | "bf16"
  prompt: "Stack the three cups into a small tower."    # text instruction; sha256 must match a file in context_cache_dir
  context_cache_dir: "../checkpoints/text_embeds_cache/stack_3_cups_gen"                                # dir of precomputed T5 embeddings (<sha256>.t5_lenN.<enc>.pt); relative to this yaml -> <repo>/checkpoints/...
  use_text_encoder: false                                                                         # false=read from cache; true=run T5 inline (slow + needs T5 in VRAM)
  action_horizon: 32                                                                              # # of future actions predicted per inference call (chunk length)
  num_inference_steps: 10                                                                         # flow-matching denoising steps; smaller = faster, lower quality
  seed: 42                                                                                        # RNG seed for noise sampling
  rand_device: "cpu"                                                                            # device for noise tensor (cpu for reproducibility)
  expert_cache: false                                                                              # enable fixed-step action DiT body residual caching
  expert_cache_reuse_steps: 1                                                                     # adjacent denoising steps that reuse cached body residual
  expert_cache_warmup_steps: 1                                                                    # initial denoising steps that always compute the DiT body
  expert_cache_cooldown_steps: 1                                                                  # final denoising steps that always compute the DiT body
  cuda_graph: true                                                                                # enable CUDA Graph setup for FastWAM action inference
  torch_compile: true                                                                             # enable torch.compile when setting up inference graph managers

policy_server:
  host: "127.0.0.1"                                                                               # RPC server bind address
  port: 8765                                                                                      # RPC server port (runtime must match)
  authkey: "wam"                                                                              # shared secret between server and runtime

runtime:
  arm_mode: "dual"                                                                               # "dual" (14-dim, both arms) | "right" | "left" (7-dim single arm). MUST match the served checkpoint's action dim. CLI: --arm-mode/--arm-side override this.
  action_chunk_size: 32                                                                           # # of actions kept from each predicted chunk for execution
  exp_weight_factor: 0.8                                                                      # RTC temporal-ensembling weight; higher = trust new chunks more
  rtc_debug: false                                                                                # print verbose RTC buffer logs
  rospy_rate: 50                                                                               # control loop frequency (Hz); arm receives one command every 1/rate s
  execute_actions: False                                                                         # true=actually move Piper; false=dry-run (predict only)
  move_to_initial: True                                                                        # move arms to left/right_init_position before inference; safe default false, opt in via --move-to-initial
  max_steps: null                                                                                 # max control steps; null = run until Ctrl+C or safety stop
  save_rollout: false                                                                             # persist full rollout (currently saves selected_actions only)
  output_dir: "./output_actions"                                                                  # where rtc_selected_actions.npy and rollouts are written

robot:
  left_channel: "can_left"                                                                        # CAN interface name for left Piper
  right_channel: "can_right"                                                                      # CAN interface name for right Piper
  bitrate: 1000000                                                                                # CAN bus bitrate (1 Mbit/s)
  speed_pct: 15                                                                                   # joint command speed scaling 0-100 (%)
  max_linear_vel: 0.5                                                                             # chassis linear velocity cap (m/s) - unused if no base motion
  max_angular_vel: 0.1                                                                            # chassis angular velocity cap (rad/s)
  max_linear_acc: 0.1                                                                             # chassis linear acceleration cap (m/s^2)
  max_angular_acc: 0.05                                                                           # chassis angular acceleration cap (rad/s^2)
  action_safety_threshold: 1.5                                                                    # abort if mean|action - last_action| > this (jump guard)
  state_safety_threshold: 0.3                                                                     # abort if mean|current_state - last_action| > this (state-tracking guard; code: robot_runtime.py:439)
  # left_init_position: [0.07692804, 0.7056796, -0.08251012, 0.08059128, 0.04542417, 0.13731916, 0.0793]
  # right_init_position: [0.15575747, 0.60794085, -0.568343, 0.21675915, 1.1470476, 0.06770016, -0.0026]
  #left_init_position:  [-0.3079215, 1.2350178, -0.45439875, -0.09330796, -0.15022773, 0.04931419, -0.0049]   # 7-dim [j0..j5, gripper] for left Piper, position for pick_number
  #right_init_position: [0.60563827, 0.67733306, -0.4182199, -0.23146443, 0.10942622, 0.11945651, -0.0024]    # 7-dim [j0..j5, gripper] for right Piper, position for pick_number
  # left_init_position:  [-0.4073, 0.7073, -0.5687, 0.1449, 1.0449, -0.1613, 0.0005]  # 7-dim [j0..j5, gripper] for left Piper, position for pick_1_cup
  # right_init_position: [0.5243, 1.1371, -0.7563, 0.0920, 1.1579, 0.0547, -0.0003] # 7-dim [j0..j5, gripper] for right Piper, position for pick_1_cup
  left_init_position: [-0.75764, 1.03441, -0.74778, 0.03059, 0.93736, -0.07892, 0.06808]
  right_init_position: [0.63639, 1.00319, -0.71547, 0.01034, 1.02991, 0.19950, 0.06644]


cameras:
  use_front: true                                                                                 # subscribe head camera color stream
  use_wrist: true                                                                                 # master switch for wrist cameras (overridden by below if needed)
  use_left_wrist: true                                                                            # subscribe left-wrist camera
  use_right_wrist: true                                                                           # subscribe right-wrist camera
  use_depth_image: false                                                                          # subscribe depth streams too (current model is RGB-only)
  front_camera_name: "cam_high"                                                                   # observation key fed to model for head cam
  left_wrist_camera_name: "cam_left_wrist"                                                        # observation key for left wrist cam
  right_wrist_camera_name: "cam_right_wrist"                                                      # observation key for right wrist cam

ros_topics_dual:
  img_front_topic: "/camera_h/color/image_raw"                                                    # head camera RGB ROS topic
  img_left_topic: "/camera_l/color/image_raw"                                                     # left-wrist camera RGB ROS topic
  img_right_topic: "/camera_r/color/image_raw"                                                    # right-wrist camera RGB ROS topic
  img_front_depth_topic: "/camera_h/depth/image_raw"                                              # head camera depth (only used if use_depth_image=true)
  img_left_depth_topic: "/camera_l/depth/image_raw"                                               # left-wrist camera depth
  img_right_depth_topic: "/camera_r/depth/image_raw"                                              # right-wrist camera depth
